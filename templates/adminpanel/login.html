{% extends "base.html" %}
{% load static %}

{% block title %}Admin Login • DemandIQ{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg border-0 rounded-4 p-4">
        <div class="d-flex align-items-center gap-3 mb-3">
              <div class="brand-badge">DI</div>
              <div>
            <div class="fw-bold fs-5">DemandIQ</div>
            <div class="text-muted small">Admin Panel</div>
          </div>
        </div>

        <h3 class="fw-bold mb-1">Welcome back</h3>
        <p class="text-muted mb-4">Login to continue to Admin Panel.</p>

        {% if error %}
          <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input name="username" class="form-control form-control-lg" placeholder="e.g. admin" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter your password" required>
          </div>

          <button class="btn btn-primary w-100 btn-lg">Log in</button>

          <div class="text-center mt-3">
            <a href="/" class="text-decoration-none">Back to site</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
